<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services & Pricing | Vector Baseball</title>
    <link rel="stylesheet" href="mystyle.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">VECTOR BASEBALL</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Services</a></li>
                <li><a href="togo.html" class="active">Register</a></li>
            </ul>
        </div>
    </nav>
    <main class="container">
        <header class="menu-header">
            <h1>Mission Registration</h1>
            <p>Secure your training slot and initialize your performance data track.</p>
        </header>

        <section class="form-section">
            <form class="registration-form">
                
                <fieldset class="form-group">
                    <legend>Athlete Intel</legend>
                    <div class="input-row">
                        <div class="field">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="athlete_name" placeholder="First Last" required>
                        </div>
                        <div class="field">
                            <label for="email">Contact Intelligence (Email)</label>
                            <input type="email" id="email" name="athlete_email" placeholder="email@example.com" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset class="form-group">
                    <legend>Mission Parameters</legend>
                    <div class="input-row">
                        <div class="field">
                            <label for="service">Select Discipline</label>
                            <select id="service" name="service_type" required>
                                <option value="" disabled selected>Select Service...</option>
                                <option value="pitching">🎯 Pitching: Bio-Mechanical Recon</option>
                                <option value="pitching">🎯 Pitching: Arsenal Calibration</option>
                                <option value="batting">⚡ Batting: Vector Blast Profile</option>
                                <option value="analytics">📊 Analytics: The "Intel" Brief</option>
                                <option value="strength">🛡️ Strength: Tactical Athlete S&C</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="start-date">Deployment Date (Service Start)</label>
                            <input type="date" id="start-date" name="service_start" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset class="form-group">
                    <legend>Payment Processing</legend>
                    <div class="field full-width">
                        <label for="card-num">Card Number</label>
                        <input type="text" id="card-num" name="card_number" placeholder="0000 0000 0000 0000" required>
                    </div>
                    <div class="input-row">
                        <div class="field">
                            <label for="expiry">Exp Date</label>
                            <input type="text" id="expiry" name="card_expiry" placeholder="MM/YY" required>
                        </div>
                        <div class="field">
                            <label for="cvv">CVV</label>
                            <input type="password" id="cvv" name="card_cvv" placeholder="***" required>
                        </div>
                    </div>
                </fieldset>

                <div class="cta-box">
                    <p>By clicking "Finalize Mission," you agree to the Digital AAR terms.</p>
                    <button type="submit" class="btn-primary">Finalize Mission</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
