<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            height: 100vh;
        }
        .container {
            display: flex;
            background-color: lightgray;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card{
           height: 250px;
            width: 350px;
            justify-content: center;
            align-items: center;
            background-color: aqua;
            text-align: center;
        }
    </style>
</head>
<body>
    <section class="container">
        <div class="card">
        This is a card!
        </div>
    </section>
</body>
</html>
